<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóveis</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>
        <nav>
            <div class="logo">Imobiliaria</div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="imovel.html">Imóveis</a></li>
                <li><a href="#" id="abrirCadastro">Cadastre-se</a></li>
            </ul>
        </nav>
    </header>

    <main class="vitrine-imoveis">
        <h1>Imóveis Disponpiveis</h1>

        <div class="grid-imoveis">
            <article class="card-imovel">
                <div class="tag-venda">Venda</div>
                <img src="img/casa3.jpg" alt="Casa em Condominio">
                <div class="info-imovel">
                    <h3>Village Paineiras</h3>
                    <p class="bairro">Bairro: Socorro</p>
                    <p class="preco">R$ 450.000,00</p>
                    <div class="detalhes-icones">
                        <span> 3 Quartos </span>
                        <span> 2 Vagas </span>
                    </div>
                    <button class="btn-detalhes">Ver mais detalhes</button>
                </div>
            </article>

            <article class="card-imovel">
                <div class="tag-aluguel">Aluguel</div>
                <img src="img/ap.jpg" alt="Apartamento Centro">
                <div class="info-imovel">
                    <h3>Apartamento Moderno</h3>
                    <p class="bairro">Bairro: Centro</p>
                    <p class="preco">R$ 2.500,00 /mês</p>
                    <div class="detalhes-icones">
                        <span> 2 Quartos </span>
                        <span> 1 Vaga </span>
                    </div>
                    <button class="btn-detalhes">Ver mais detalhes</button>
                </div>
            </article>

            <article class="card-imovel">
                <div class="tag-venda">Venda</div>
                <img src="img/casa2.jpg" alt="Sobrado">
                <div class="info-movel">
                    <h3> Sobrado </h3>
                    <p class="bairro">Alto do Tabaú</p>
                    <p class="preco">R$ 680.000,00</p>
                    <div class="detalhes-icones">
                        <span> 4 Quartos </span>
                        <span> 3 vagas </span>
                    </div>
                    <button class="btn-detalhes">Ver mais detalhes</button>
                </div>
            </article>
        </div>
    </main>
    
</body>
</html>
